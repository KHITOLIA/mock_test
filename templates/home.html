<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mock Test Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#05070f;
  --surface:rgba(255,255,255,0.04);
  --surface-hover:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08);
  --border-focus:rgba(251,191,36,0.6);
  --amber:#fbbf24;
  --amber-glow:rgba(251,191,36,0.15);
  --cyan:#22d3ee;
  --cyan-glow:rgba(34,211,238,0.12);
  --text:#f1f5f9;
  --text-2:rgba(241,245,249,0.5);
  --text-3:rgba(241,245,249,0.28);
  --r:12px;
}

html,body{height:100%}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:48px 20px 80px;
  overflow-x:hidden;
  position:relative;
}

/* ── Mesh background ── */
.mesh{
  position:fixed;inset:0;
  pointer-events:none;
  z-index:0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 10%, rgba(251,191,36,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(34,211,238,0.07) 0%, transparent 55%),
    radial-gradient(ellipse 50% 60% at 50% 50%, rgba(139,92,246,0.05) 0%, transparent 70%);
}
.grid-lines{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 90% 90% at 50% 50%,black 30%,transparent 100%);
}

/* ── Card ── */
.card{
  position:relative;
  z-index:10;
  width:100%;
  max-width:460px;
  background:rgba(255,255,255,0.035);
  border:1px solid var(--border);
  border-radius:24px;
  padding:44px 40px 48px;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.04) inset,
    0 32px 80px rgba(0,0,0,0.6),
    0 0 60px rgba(251,191,36,0.04);
  animation:cardIn .7s cubic-bezier(.16,1,.3,1) both;
}
.card::before{
  content:'';position:absolute;inset:0;border-radius:24px;
  background:linear-gradient(135deg,rgba(251,191,36,0.06) 0%,transparent 50%,rgba(34,211,238,0.04) 100%);
  pointer-events:none;
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(28px) scale(.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* ── Top badge ── */
.badge-row{
  display:flex;align-items:center;gap:10px;
  margin-bottom:32px;
}
.badge-icon{
  width:42px;height:42px;border-radius:12px;
  background:linear-gradient(135deg,rgba(251,191,36,0.15),rgba(251,191,36,0.05));
  border:1px solid rgba(251,191,36,0.2);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.badge-icon svg{width:20px;height:20px;fill:none;stroke:var(--amber);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.badge-text{}
.badge-text h1{
  font-family:'Syne',sans-serif;
  font-size:18px;font-weight:800;
  letter-spacing:-.3px;
  background:linear-gradient(90deg,#fbbf24,#f97316);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.badge-text p{font-size:12px;color:var(--text-3);margin-top:1px}

/* ── Section label ── */
.section-label{
  font-size:11px;font-weight:600;letter-spacing:1.2px;
  text-transform:uppercase;color:var(--text-3);
  margin:24px 0 14px;
  display:flex;align-items:center;gap:8px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── Field ── */
.field{margin-bottom:14px;position:relative}
.field label{
  display:block;font-size:11.5px;font-weight:500;
  color:var(--text-3);letter-spacing:.3px;
  margin-bottom:7px;
}
.field input,.field select{
  width:100%;padding:12px 14px 12px 40px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  color:var(--text);
  font-family:'Inter',sans-serif;font-size:14px;
  outline:none;
  transition:border-color .2s,background .2s,box-shadow .2s;
  -webkit-appearance:none;
}
.field input::placeholder{color:var(--text-3)}
.field input:focus,.field select:focus{
  border-color:var(--border-focus);
  background:rgba(251,191,36,0.04);
  box-shadow:0 0 0 3px rgba(251,191,36,0.08);
}
.field-icon{
  position:absolute;left:13px;bottom:13px;
  width:16px;height:16px;pointer-events:none;
  fill:none;stroke:var(--text-3);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;
  transition:stroke .2s;
}
.field:focus-within .field-icon{stroke:var(--amber)}
.field select option{background:#0f111a;color:var(--text)}

/* ── Two col ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ── Exam selector ── */
.exam-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:4px}
.exam-card{
  position:relative;
  padding:14px 10px 12px;
  border:1.5px solid var(--border);
  border-radius:var(--r);
  cursor:pointer;
  text-align:center;
  transition:all .25s ease;
  background:var(--surface);
}
.exam-card:hover{border-color:rgba(251,191,36,0.35);background:var(--amber-glow)}
.exam-card input[type=radio]{
  position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;margin:0;
}
.exam-card .ec-icon{font-size:22px;margin-bottom:6px;display:block}
.exam-card .ec-name{font-size:12px;font-weight:600;color:var(--text-2);letter-spacing:.2px}
.exam-card .ec-tag{font-size:10px;color:var(--text-3);margin-top:3px}
.exam-card.selected{
  border-color:var(--amber);
  background:var(--amber-glow);
  box-shadow:0 0 16px rgba(251,191,36,0.1);
}
.exam-card.selected .ec-name{color:var(--amber)}
.exam-card .check-dot{
  position:absolute;top:8px;right:8px;
  width:14px;height:14px;border-radius:50%;
  border:1.5px solid var(--border);
  background:transparent;
  transition:all .2s;
  display:flex;align-items:center;justify-content:center;
}
.exam-card.selected .check-dot{
  border-color:var(--amber);background:var(--amber);
}
.exam-card.selected .check-dot::after{
  content:'';width:5px;height:5px;border-radius:50%;background:#000;
}

/* ── Trainer select styled ── */
.trainer-pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px}
.trainer-pill{
  position:relative;
  padding:8px 16px;
  border:1.5px solid var(--border);
  border-radius:99px;
  cursor:pointer;
  font-size:13px;font-weight:500;color:var(--text-2);
  background:var(--surface);
  transition:all .2s;
  white-space:nowrap;
  user-select:none;
}
.trainer-pill input[type=radio]{
  position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;margin:0;
}
.trainer-pill:hover{border-color:rgba(34,211,238,0.4);color:var(--cyan)}
.trainer-pill.selected{
  border-color:var(--cyan);
  background:var(--cyan-glow);
  color:var(--cyan);
  box-shadow:0 0 12px rgba(34,211,238,0.1);
}

/* ── Submit ── */
.submit-btn{
  width:100%;margin-top:28px;
  padding:15px;
  background:linear-gradient(135deg,#fbbf24,#f97316);
  color:#0a0a0a;
  font-family:'Syne',sans-serif;
  font-size:15px;font-weight:700;
  letter-spacing:.3px;
  border:none;border-radius:var(--r);
  cursor:pointer;
  position:relative;overflow:hidden;
  transition:transform .25s,box-shadow .25s;
  display:flex;align-items:center;justify-content:center;gap:9px;
}
.submit-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,#fcd34d,#fb923c);
  opacity:0;transition:opacity .25s;
}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(251,191,36,0.35)}
.submit-btn:hover::before{opacity:1}
.submit-btn:active{transform:translateY(0)}
.submit-btn span{position:relative;z-index:1;display:flex;align-items:center;gap:8px}
.submit-btn svg{width:17px;height:17px;fill:none;stroke:#0a0a0a;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

/* ── Footer note ── */
.foot-note{
  display:flex;justify-content:center;gap:20px;
  margin-top:24px;flex-wrap:wrap;
}
.fn-item{
  display:flex;align-items:center;gap:5px;
  font-size:11.5px;color:var(--text-3);
}
.fn-dot{width:5px;height:5px;border-radius:50%;background:var(--amber);opacity:.6}

@media(max-width:500px){
  .card{padding:32px 22px 40px}
  .grid2{grid-template-columns:1fr}
  .exam-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="mesh"></div>
<div class="grid-lines"></div>

<div class="card">
  <div class="badge-row">
    <div class="badge-icon">
      <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><path d="M9 12h6M9 16h4"/></svg>
    </div>
    <div class="badge-text">
      <h1>MOCK TEST PORTAL</h1>
      <p>Enter your details to begin</p>
    </div>
  </div>

  <form method="POST" id="mainForm">

    <div class="section-label">Student Info</div>

    <div class="grid2">
      <div class="field">
        <label>Full Name</label>
        <svg class="field-icon" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <input type="text" name="name" placeholder="Your name" required autocomplete="off">
      </div>
      <div class="field">
        <label>Enrollment No.</label>
        <svg class="field-icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M8 9h8M8 13h5"/></svg>
        <input type="text" name="enroll_no" placeholder="EN2024001" required autocomplete="off">
      </div>
    </div>

    <div class="field">
      <label>Batch Number</label>
      <svg class="field-icon" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      <input type="text" name="batch_no" placeholder="e.g. B-12" required autocomplete="off">
    </div>

    <div class="section-label">Select Trainer</div>
    <div class="trainer-pills">
      <label class="trainer-pill" id="tp-tushar">
        <input type="radio" name="trainer_name" value="Tushar" required onchange="selectTrainer(this)"> Tushar
      </label>
      <label class="trainer-pill" id="tp-kuldeep">
        <input type="radio" name="trainer_name" value="Kuldeep" onchange="selectTrainer(this)"> Kuldeep
      </label>
      <label class="trainer-pill" id="tp-prashant">
        <input type="radio" name="trainer_name" value="Prashant" onchange="selectTrainer(this)"> Prashant
      </label>
      <label class="trainer-pill" id="tp-nagesh">
        <input type="radio" name="trainer_name" value="Nagesh" onchange="selectTrainer(this)"> Nagesh
      </label>
    </div>

    <button type="submit" class="submit-btn">
      <span>
        <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        Begin Exam
      </span>
    </button>

  </form>

  <div class="foot-note">
    <div class="fn-item"><div class="fn-dot"></div>20 min duration</div>
    <div class="fn-item"><div class="fn-dot"></div>Auto-submit on timeout</div>
    <div class="fn-item"><div class="fn-dot"></div>40% passing marks</div>
  </div>
</div>

<script>
function selectExam(radio){
  document.querySelectorAll('.exam-card').forEach(c=>c.classList.remove('selected'));
  radio.closest('.exam-card').classList.add('selected');
}
function selectTrainer(radio){
  document.querySelectorAll('.trainer-pill').forEach(p=>p.classList.remove('selected'));
  radio.closest('.trainer-pill').classList.add('selected');
}
// Stagger field entrance
document.querySelectorAll('.field,.exam-card,.trainer-pill').forEach((el,i)=>{
  el.style.opacity='0';el.style.transform='translateY(12px)';
  el.style.transition='opacity .4s ease, transform .4s ease';
  setTimeout(()=>{el.style.opacity='1';el.style.transform='translateY(0)'},300+i*55);
});
</script>
</body>
</html>
